<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Pete & Ben</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* Main Layout Grid split into Art Panel and Content Panel */
        .thanks-page {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            height: 100vh;
            background-color: var(--bg-cream);
            overflow: hidden;
        }

        /* --- COMPLEX ART PANEL LAYER --- */
        .bauhaus-canvas {
            display: grid;
            grid-template-columns: 150px 1fr;
            background-color: var(--bh-black);
            border-right: var(--border-thick);
            position: relative;
        }

        /* Left-side structural strip with mini alignment dot */
        .canvas-strip-left {
            background-color: var(--bg-cream);
            border-right: var(--border-thick);
            position: relative;
        }

        .canvas-strip-left::after {
            content: '';
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background-color: var(--bh-red);
            border-radius: 50%;
            border: 3px solid var(--bh-black);
        }

        /* Main asymmetric geometric art matrix */
        .canvas-matrix-right {
            display: grid;
            grid-template-rows: 1.8fr 1fr;
            position: relative;
        }

        .matrix-top-red {
            background-color: var(--bh-red);
            border-bottom: var(--border-thick);
            position: relative;
        }

        /* Giant Overlapping Ochre Circle */
        .matrix-top-red::before {
            content: '';
            position: absolute;
            bottom: -90px;
            left: -40px;
            width: 260px;
            height: 260px;
            background-color: var(--bh-yellow);
            border-radius: 50%;
            border: var(--border-thick);
            z-index: 3;
        }

        .matrix-bottom-blue {
            background-color: var(--bh-blue);
            position: relative;
        }

        /* Stark floating black rectangle accent inside blue zone */
        .matrix-bottom-blue::before {
            content: '';
            position: absolute;
            top: 40px;
            right: 40px;
            width: 120px;
            height: 60px;
            background-color: var(--bh-black);
            border: 3px solid var(--bg-cream);
        }

        /* --- CONTENT PANEL WITH GRAPHIC FRAMING --- */
        .thanks-content-panel {
            padding: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            background-color: var(--bg-cream);
        }

        /* Structural frame line running down the text side */
        .thanks-content-panel::after {
            content: '';
            position: absolute;
            top: 0;
            left: 40px;
            width: var(--border-thick);
            height: 100%;
            background-color: var(--bh-black);
            opacity: 0.15;
            pointer-events: none;
        }

        /* Oversized Background Watermark Blueprint */
        .thanks-watermark {
            position: absolute;
            bottom: -20px;
            right: 20px;
            font-family: 'Syne', sans-serif;
            font-size: 11rem;
            font-weight: 800;
            color: rgba(26, 26, 26, 0.04);
            letter-spacing: -6px;
            line-height: 0.8;
            pointer-events: none;
            text-transform: uppercase;
        }

        .thanks-content-panel h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(3.5rem, 6vw, 6rem);
            text-transform: uppercase;
            line-height: 0.85;
            margin-bottom: 30px;
            color: var(--bh-black);
            z-index: 2;
        }

        .thanks-content-panel p {
            font-family: 'Syne', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--bh-red);
            margin-bottom: 50px;
            max-width: 420px;
            line-height: 1.3;
            z-index: 2;
        }

        .thanks-content-panel .btn {
            z-index: 2;
        }

        /* --- RESPONSIVE MOBILE CONSTRAINTS --- */
        @media (max-width: 900px) {
            .thanks-page {
                grid-template-columns: 1fr;
                height: auto;
                overflow: y-visible;
            }
            .bauhaus-canvas {
                grid-template-columns: 80px 1fr;
                height: 45vh;
                border-right: none;
                border-bottom: var(--border-thick);
            }
            .canvas-strip-left::after {
                width: 25px;
                height: 25px;
                top: 30px;
            }
            .matrix-top-red::before {
                width: 160px;
                height: 160px;
                bottom: -60px;
                left: -20px;
            }
            .matrix-bottom-blue::before {
                width: 80px;
                height: 40px;
                top: 20px;
                right: 20px;
            }
            .thanks-content-panel {
                padding: 60px 25px;
                height: 55vh;
            }
            .thanks-content-panel::after {
                left: 15px;
            }
            .thanks-watermark {
                font-size: 7rem;
            }
        }
    </style>
</head>
<body>

    <div class="thanks-page">
        
        <!-- Left: Structural Multi-layered Art Canvas -->
        <div class="bauhaus-canvas">
            <div class="canvas-strip-left"></div>
            <div class="canvas-matrix-right">
                <div class="matrix-top-red"></div>
                <div class="matrix-bottom-blue"></div>
            </div>
        </div>

        <!-- Right: Content & Floating Graphic Frame -->
        <main class="thanks-content-panel">
            <h1>Nice<br>One!</h1>
            <p>Your RSVP has landed straight in our inbox.</p>
            <a href="index.html" class="btn">Back to Main Page</a>
            
            <!-- Layered watermark print -->
            <div class="thanks-watermark">DANKE</div>
        </main>

    </div>

</body>
</html>

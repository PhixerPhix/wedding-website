<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Pete & Ben</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* Specific layouts for the thank you container */
        .thanks-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }
        .thanks-box {
            background: var(--bg-cream);
            padding: 60px;
            border: var(--border-thick);
            box-shadow: 20px 20px 0px var(--bh-black);
            max-width: 600px;
        }
        .thanks-box h1 {
            font-family: 'Syne', sans-serif;
            font-size: 4rem;
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 20px;
            color: var(--bh-red);
        }
        .thanks-box p {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 40px;
        }
    </style>
</head>
<body style="background-color: var(--bh-blue);"> <!-- Blue background for visual contrast -->

    <div class="thanks-container">
        <div class="thanks-box">
            <h1>Nice One!</h1>
            <p>Your RSVP has landed right in our inbox.</p>
            <a href="index.html" class="btn">Back to Main Page</a>
        </div>
    </div>

</body>
</html>

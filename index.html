<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wedding | Pete & Ben</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Space+Grotesk:wght=400;600&family=Syne:wght=700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-content">
            <h1>Pete &<br>Ben</h1>
            <p class="subtitle">Are Getting Married.</p>
            <p class="date">19 . 06 . 2027</p>
            <div class="countdown-box">
                <div id="countdown">Loading countdown...</div>
            </div>
            <div>
                <a href="#rsvp" class="btn">RSVP HERE</a>
            </div>
        </div>
        <!-- Right side graphic grid element panel -->
        <div class="hero-graphic">
            <div class="graphic-top"></div>
            <div class="graphic-bottom"></div>
        </div>
    </header>

    <!-- Details Section -->
    <section class="details">
        <h2>The Big Day</h2>
        <div class="grid">
            <div class="card">
                <h3>When</h3>
                <p><strong>Ceremony:</strong> 2:00 PM</p>
                <p><strong>Reception:</strong> 4:30 PM until late</p>
            </div>
            <div class="card">
                <h3>Where</h3>
                <p>The Grand Pavilion</p>
                <p>123 Ocean Drive, Coastal Town</p>
                <p><em>Dress Code: Formal Attire</em></p>
                
                <!-- Map Container -->
                <div class="map-container">
                    <!-- PASTE YOUR COPIED GOOGLE MAPS IFRAME CODE DIRECTLY BELOW THIS LINE -->
                    <iframe src="https://google.com..." width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </div>
    </section>

    <!-- RSVP Section -->
    <section id="rsvp" class="rsvp-section">
        <h2>Will You Attend?</h2>
        <p>Please reply by 1st May 2027</p>
        
        <form action="https://formspree.io" method="POST" class="rsvp-form">
            <label for="name">Full Name(s)</label>
            <input type="text" id="name" name="name" required placeholder="e.g. Jane and John Doe">

            <label for="attendance">Attendance</label>
            <select id="attendance" name="attendance" required>
                <option value="" disabled selected>Select an option</option>
                <option value="joyfully-accepts">Joyfully Accepts</option>
                <option value="regretfully-declines">Regretfully Declines</option>
            </select>

            <label for="dietary">Dietary Requirements / Allergies</label>
            <textarea id="dietary" name="dietary" rows="3" placeholder="None, Vegetarian, Nut allergy, etc."></textarea>

            <button type="submit" class="btn submit-btn">Submit RSVP</button>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
